name: "Scan and Extract SARIF"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Future-proof for Node.js 24 transition
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze-and-export:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v4

      - name: Fetch and Display Python SARIF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for GitHub to index results..."
          sleep 20
          
          # This specifically selects the 'language:python' scan category
          ANALYSIS_ID=$(gh api /repos/${{ github.repository }}/code-scanning/analyses \
            --jq 'map(select(.category == "/language:python" or .category == "language:python")) | .[0].id')
          
          if [ -z "$ANALYSIS_ID" ] || [ "$ANALYSIS_ID" == "null" ]; then
            echo "Python-specific analysis not found. Trying latest overall..."
            ANALYSIS_ID=$(gh api /repos/${{ github.repository }}/code-scanning/analyses --jq '.[0].id')
          fi

          echo "Exporting Analysis ID: $ANALYSIS_ID"

          gh api /repos/${{ github.repository }}/code-scanning/analyses/$ANALYSIS_ID \
            -H "Accept: application/sarif+json" > results.sarif

          echo "--- SUMMARY OF VULNERABILITIES ---"
          # Only print the rule IDs to keep logs clean
          jq -r '.runs[].results[].ruleId' results.sarif | sort | uniq -c || echo "No findings."
          
          echo "--- RAW CONTENT PREVIEW (Top 50 lines) ---"
          head -n 50 results.sarif
            
      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-scan-results
          path: results.sarif
