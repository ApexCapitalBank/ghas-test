name: "Scan and Extract SARIF"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          # Using 'security-and-quality' ensures more results are found
          queries: security-and-quality

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v4

      - name: Export SARIF File
        id: export
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for indexing..."
          sleep 25
          
          # Fetch the latest Python analysis ID
          ANALYSIS_ID=$(gh api /repos/${{ github.repository }}/code-scanning/analyses \
            --jq 'map(select(.category == "language:python")) | .[0].id')
          
          if [ -z "$ANALYSIS_ID" ] || [ "$ANALYSIS_ID" == "null" ]; then
             echo "Error: No Python analysis found."
             exit 1
          fi

          echo "Exporting Analysis ID: $ANALYSIS_ID"
          gh api /repos/${{ github.repository }}/code-scanning/analyses/$ANALYSIS_ID \
            -H "Accept: application/sarif+json" > results.sarif

      - name: Verify and Log Results
        run: |
          echo "--- ANALYSIS RESULTS OVERVIEW ---"
          COUNT=$(jq '.runs[].results | length' results.sarif)
          
          if [ "$COUNT" -eq "0" ]; then
            echo "❌ SUCCESS: Scan finished but 0 vulnerabilities were found."
            echo "Tip: Ensure 'vulnerable.py' uses Flask-style requests to trigger data-flow alerts."
          else
            echo "✅ FOUND: $COUNT vulnerabilities detected in SARIF output."
            echo "--- LIST OF RULES TRIGGERED ---"
            jq -r '.runs[].results[].ruleId' results.sarif | sort | uniq -c
          fi
          
          echo "--- RAW PREVIEW ---"
          head -n 50 results.sarif
            
      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-scan-results
          path: results.sarif
