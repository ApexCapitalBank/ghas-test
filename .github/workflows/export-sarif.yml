name: "Scan and Extract SARIF"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v4

      - name: Export SARIF File
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for GitHub API to sync..."
          sleep 30
          
          # Refined JQ: Find any analysis where category contains 'python'
          # We take the [0] index to ensure we get the absolute latest one
          ANALYSIS_ID=$(gh api /repos/${{ github.repository }}/code-scanning/analyses \
            --jq '[.[] | select(.category | contains("python"))] | .[0].id')
          
          if [ -z "$ANALYSIS_ID" ] || [ "$ANALYSIS_ID" == "null" ]; then
             echo "Python-specific analysis not found. Falling back to the latest global analysis ID..."
             ANALYSIS_ID=$(gh api /repos/${{ github.repository }}/code-scanning/analyses --jq '.[0].id')
          fi

          if [ -z "$ANALYSIS_ID" ] || [ "$ANALYSIS_ID" == "null" ]; then
             echo "Error: No analyses found at all for this repository."
             exit 1
          fi

          echo "Exporting Analysis ID: $ANALYSIS_ID"
          gh api /repos/${{ github.repository }}/code-scanning/analyses/$ANALYSIS_ID \
            -H "Accept: application/sarif+json" > results.sarif

      - name: Verify and Log Results
        run: |
          echo "--- ANALYSIS RESULTS OVERVIEW ---"
          # Check if the results array exists and count it
          COUNT=$(jq '[.runs[].results[]] | length' results.sarif)
          
          echo "✅ FOUND: $COUNT vulnerabilities detected in SARIF output."
          
          if [ "$COUNT" -gt "0" ]; then
            echo "--- LIST OF RULES TRIGGERED ---"
            jq -r '.runs[].results[].ruleId' results.sarif | sort | uniq -c
          fi
            
      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-scan-results
          path: results.sarif
