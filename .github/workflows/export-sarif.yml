name: "Scan and Extract SARIF"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flask pyyaml lxml requests

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v4
        with:
          output: sarif-results

      - name: Verify Results
        run: |
          SARIF_FILE=$(ls sarif-results/*.sarif | head -1)
          echo "SARIF file: $SARIF_FILE"

          COUNT=$(jq '[.runs[].results[]] | length' "$SARIF_FILE")
          echo "✅ FOUND: $COUNT vulnerabilities detected."

          if [ "$COUNT" -gt "0" ]; then
            echo "--- RULES TRIGGERED ---"
            jq -r '.runs[].results[].ruleId' "$SARIF_FILE" | sort | uniq -c | sort -rn
          fi

      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-scan-results
          path: sarif-results/*.sarif
